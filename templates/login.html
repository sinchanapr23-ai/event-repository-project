<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – EventRepo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">📁</div>
            <h1 class="logo-text">EventRepo</h1>
            <p class="logo-sub">Centralized College Event Repository</p>
            <p class="login-college-name">GSSS Institute of Engineering &amp; Technology for Women</p>
        </div>
        <h2 class="login-title">{{ department }} Department Login</h2>
        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" class="login-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login to Dashboard →</button>
        </form>
        {% if department == 'ADMIN' %}
<p class="login-hint">Admin Access Only</p>
{% else %}
<p class="login-hint">
    {{ department }} Department Login
</p>
{% endif %}
    </div>
</div>
</body>
</html>
